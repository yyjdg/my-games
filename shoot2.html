<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>固若金汤：深渊降临</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root { --primary-gold: #fbbf24; }
        body {
            margin: 0; background-color: #050505;
            font-family: 'ZCOOL XiaoWei', serif;
            color: white; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #game-wrapper {
            position: relative; width: 100%; height: 100%;
            max-width: 500px; max-height: 888px; aspect-ratio: 9 / 16;
            background: linear-gradient(180deg, #5d4037, #3e2723 50%, #1a100b);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.9); border: 4px solid #110a07; border-radius: 20px;
        }
        #game-wrapper::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.15; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        canvas { width: 100%; height: 100%; display: block; position: relative; z-index: 10; }
        .ui-overlay { pointer-events: none; position: absolute; inset: 0; z-index: 50; }
        .interactable { pointer-events: auto; }
        
        @keyframes flash-gold { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.1); box-shadow: 0 0 20px var(--primary-gold); background-color: rgba(251,191,36,0.3); } 
            100% { transform: scale(1); } 
        }
        .gold-boom { animation: flash-gold 0.3s ease-out; }
        
        .btn-action {
            background: linear-gradient(180deg, #b45309, #78350f);
            border: 2px solid #fbbf24; border-radius: 12px;
            box-shadow: 0 4px 0 #451a03, inset 0 2px 5px rgba(255,255,255,0.2); 
            transition: all 0.1s; cursor: pointer; text-shadow: 1px 1px 2px black;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 2px;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 0 0 #451a03; }
        .btn-disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        
        #pause-screen, #death-screen, #win-screen { z-index: 100; pointer-events: none; backdrop-filter: blur(5px); }
        .screen-active { pointer-events: auto !important; display: flex !important; }
        
        #ice-warning { transition: opacity 0.2s; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        #boss-ui { transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(-150%); }
        #boss-ui.active { transform: translateY(0); }

        #base-hp-container {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 160px; z-index: 40; text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="base-hp-container">
        <div class="text-white text-xs font-bold drop-shadow-[0_2px_2px_black] mb-1">城防结界</div>
        <div class="w-full h-3 bg-gray-900 rounded-full border border-white/40 overflow-hidden relative shadow-[0_0_15px_red]">
            <div id="hp-bar" class="h-full bg-gradient-to-r from-red-800 to-red-500 transition-all duration-300" style="width: 100%"></div>
        </div>
    </div>

    <div class="ui-overlay flex flex-col p-4">
        <div class="flex justify-between items-start relative">
            <div id="gold-ui" class="interactable bg-black/80 p-2 px-4 rounded-2xl border-2 border-amber-500/80 transition-transform">
                <span class="text-amber-400 text-[10px] block opacity-80 uppercase">国库黄金</span>
                <span id="gold-val" class="text-2xl font-black text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.8)]">1000</span>
            </div>
            
            <div id="boss-ui" class="absolute left-1/2 -translate-x-1/2 top-0 w-48 text-center bg-black/80 p-2 rounded-xl border-2 border-purple-600 shadow-[0_0_15px_purple]">
                <div id="boss-name" class="text-purple-300 font-bold text-sm mb-1 tracking-widest text-shadow-sm">深渊统领</div>
                <div class="w-full h-3 bg-gray-900 rounded-full border border-purple-400 overflow-hidden relative">
                    <div id="boss-hp-bar" class="h-full bg-gradient-to-r from-purple-800 to-fuchsia-500 transition-all duration-200" style="width: 100%"></div>
                </div>
            </div>

            <div class="text-right flex flex-col items-end gap-2">
                <button onclick="togglePause()" class="interactable bg-black/60 p-2 rounded-xl border border-white/30 backdrop-blur-md shadow-lg hover:bg-white/20 transition">
                    <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div id="wave-text" class="text-white text-lg font-bold drop-shadow-[0_2px_4px_black] bg-black/50 px-3 py-1 rounded-lg">第 1 波</div>
                <div id="ice-warning" class="text-cyan-300 font-bold text-xs mt-1 opacity-0">❄️ 冻结 x1</div>
            </div>
        </div>

        <div class="mt-auto pb-4 flex flex-col gap-2">
            <!-- 极简UI：只保留核心3个技能 -->
            <div class="interactable grid grid-cols-3 gap-3 px-2">
                <button onclick="triggerThunder()" id="btn-thunder" class="btn-action relative overflow-hidden py-3">
                    <span class="text-lg font-bold">⚡ 天雷</span>
                    <span class="text-xs text-amber-200 mt-1">800金</span>
                </button>
                <button onclick="triggerShockwave()" id="btn-shock" class="btn-action relative overflow-hidden py-3">
                    <span class="text-lg font-bold">💥 波动拳</span>
                    <span class="text-xs text-amber-200 mt-1">1500金</span>
                </button>
                <button onclick="evolveTurret()" id="btn-evolve" class="btn-action relative overflow-hidden py-3">
                    <span id="evo-name" class="text-lg font-bold">🏹 升级</span>
                    <span id="evo-cost" class="text-xs text-amber-200 mt-1">1000金</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 弹窗界面 -->
    <div id="pause-screen" class="ui-overlay items-center justify-center bg-black/80 hidden">
        <div class="text-center p-8">
            <h2 class="text-4xl font-black text-amber-400 mb-8 tracking-widest">战事暂停</h2>
            <button onclick="togglePause()" class="interactable btn-action px-12 py-3 text-xl font-bold text-white rounded-full">重返战场</button>
        </div>
    </div>

    <div id="death-screen" class="ui-overlay items-center justify-center bg-black/90 hidden">
        <div class="text-center p-8 border-4 border-amber-600 rounded-3xl bg-gradient-to-b from-neutral-900 to-black mx-4 shadow-[0_0_50px_rgba(220,38,38,0.5)]">
            <h2 class="text-5xl font-black text-red-600 mb-4 drop-shadow-[0_0_15px_red]">城破国亡</h2>
            <p id="final-stats" class="text-amber-100 text-lg mb-8">您坚守了 0 波攻势</p>
            <button onclick="location.reload()" class="interactable btn-action px-10 py-3 text-xl font-bold text-white rounded-full">东山再起</button>
        </div>
    </div>

    <div id="win-screen" class="ui-overlay items-center justify-center bg-black/90 hidden">
        <div class="text-center p-8 border-4 border-amber-400 rounded-3xl bg-gradient-to-b from-neutral-900 to-black mx-4 shadow-[0_0_50px_rgba(251,191,36,0.5)]">
            <h2 class="text-5xl font-black text-amber-400 mb-4 drop-shadow-[0_0_15px_gold]">凯旋而归！</h2>
            <p class="text-amber-100 text-lg mb-8">灭世魔神已诛，王国迎来和平</p>
            <button onclick="location.reload()" class="interactable btn-action px-10 py-3 text-xl font-bold text-white rounded-full">再创辉煌</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const goldValEl = document.getElementById('gold-val');
const hpBarEl = document.getElementById('hp-bar');
const waveTextEl = document.getElementById('wave-text');
const evoNameEl = document.getElementById('evo-name');
const evoCostEl = document.getElementById('evo-cost');
const iceWarningEl = document.getElementById('ice-warning');
const bossUiEl = document.getElementById('boss-ui');
const bossNameEl = document.getElementById('boss-name');
const bossHpBarEl = document.getElementById('boss-hp-bar');

let W, H;
let gold = 1000, baseHp = 100, wave = 1, frames = 0, waveFrames = 0; 
let isGameOver = false, isPaused = false;
let screenShake = 0, flashAlpha = 0; 
let turretAngle = -Math.PI / 2;
let turretCount = 1;

// 进化路线：伤害大幅削弱，炮塔数量与进化等级挂钩
const EVO_LEVELS = [
    { name: "🏹 长弓", type: 'bow', cost: 1000, rate: 12, dmg: 20, color: '#f39c12', turrets: 1 },
    { name: "🔫 连弩", type: 'mg', cost: 3000, rate: 5, dmg: 18, color: '#bdc3c7', turrets: 2 },
    { name: "💣 大炮", type: 'cannon', cost: 8000, rate: 60, dmg: 200, color: '#e74c3c', turrets: 3 },
    { name: "🚀 火箭巢", type: 'rocket', cost: 16000, rate: 45, dmg: 200, color: '#e67e22', turrets: 4 }, // 削弱！原来400 -> 200
    { name: "✨ 激光", type: 'laser', cost: 40000, rate: 1, dmg: 45, color: '#00f2ff', turrets: 5 } // 削弱！原来90 -> 45
];

let currentEvoIdx = 0, fireCooldown = 0, buffAtkSpeed = 1, buffDmg = 1;
let iceDebuffStacks = 0, iceDebuffTimer = 0;  
let boss = null;

const entities = { enemies: [], bullets: [], crates: [], particles: [], coins: [], thunderStrikes: [], explosions: [], lasers: [], enemySpells: [], bgDecors: [], shockwaves: [] };

// 离屏缓存
const caches = { coin: null, chariotBody: null };
function initCaches() {
    const cCoin = document.createElement('canvas'); cCoin.width = 40; cCoin.height = 40;
    const cxC = cCoin.getContext('2d'); cxC.translate(20, 20);
    cxC.fillStyle = 'rgba(0,0,0,0.3)'; cxC.beginPath(); cxC.ellipse(0, 0, 10, 4, 0, 0, Math.PI*2); cxC.fill(); 
    const grad = cxC.createLinearGradient(0, -5, 0, 5); grad.addColorStop(0, '#ffe100'); grad.addColorStop(1, '#d4af37');
    cxC.fillStyle = grad; cxC.beginPath(); cxC.moveTo(-10, -2); cxC.bezierCurveTo(-12, 5, 12, 5, 10, -2); cxC.bezierCurveTo(15, -8, -15, -8, -10, -2); cxC.fill();
    cxC.strokeStyle = '#b8860b'; cxC.lineWidth = 1; cxC.stroke();
    cxC.beginPath(); cxC.arc(0, -4, 5, 0, Math.PI*2); cxC.fill(); cxC.stroke();
    caches.coin = cCoin;

    const cCha = document.createElement('canvas'); cCha.width = 60; cCha.height = 60;
    const cxCha = cCha.getContext('2d'); cxCha.translate(30, 40);
    const carGrad = cxCha.createLinearGradient(0, -15, 0, 5); carGrad.addColorStop(0, '#9b59b6'); carGrad.addColorStop(1, '#8e44ad'); 
    cxCha.fillStyle = carGrad; cxCha.fillRect(-18, -15, 36, 24); 
    cxCha.fillStyle = '#bdc3c7'; cxCha.beginPath(); cxCha.moveTo(-18, -15); cxCha.lineTo(0, -35); cxCha.lineTo(18, -15); cxCha.fill(); 
    cxCha.beginPath(); cxCha.arc(0, -22, 7, 0, Math.PI*2); cxCha.fillStyle = '#ecf0f1'; cxCha.fill(); 
    caches.chariotBody = cCha;
}

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = canvas.width = rect.width; H = canvas.height = rect.height;
    generateBgDecors();
}

function generateBgDecors() {
    entities.bgDecors = [];
    for(let i=0; i<15; i++) entities.bgDecors.push({ x: Math.random() * W, y: Math.random() * H * 0.8, type: Math.random() > 0.6 ? 'rock' : (Math.random() > 0.5 ? 'sword' : 'flag'), size: Math.random() * 1.5 + 0.5, flip: Math.random() > 0.5 ? 1 : -1 });
}
window.addEventListener('resize', resize); initCaches(); resize();

const updateAngle = (e) => {
    if (isGameOver || isPaused) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const my = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    turretAngle = Math.atan2(my - (H - 80), mx - (W / 2));
};
canvas.parentElement.addEventListener('mousemove', updateAngle);
canvas.parentElement.addEventListener('touchmove', updateAngle);

function togglePause() {
    if (isGameOver) return;
    isPaused = !isPaused;
    document.getElementById('pause-screen').classList.toggle('screen-active', isPaused);
}

function getPerspectiveScale(y) { return 0.5 + Math.pow(y / H, 1.2) * 0.8; }

function triggerThunder() {
    if (gold < 800) return showTip("黄金不足！");
    gold -= 800; updateUI(); flashAlpha = 0.7; screenShake = 30;
    for(let i=0; i<6; i++) {
        setTimeout(() => {
            if(isGameOver || isPaused) return;
            flashAlpha = Math.max(flashAlpha, 0.5);
            const tx = Math.random() * W, ty = Math.random() * (H * 0.8);
            entities.thunderStrikes.push({ x: tx, y: ty, life: 30, width: Math.random() * 20 + 20, splits: true });
            areaDamage(tx, ty, 250, 600, true); screenShake = 15;
        }, i * 400); 
    }
}

function triggerShockwave() {
    if (gold < 1500) return showTip("黄金不足！");
    gold -= 1500; updateUI(); screenShake = 50; flashAlpha = 0.5; 
    spawnExplosion(W/2, H-80, '#f39c12', 50, 40); 
    entities.shockwaves.push({ x: W/2, y: H-80, r: 0, maxR: H * 0.85, life: 50, maxLife: 50, dmg: 1000, hitIds: new Set() });
}

function evolveTurret() {
    const next = EVO_LEVELS[currentEvoIdx + 1]; if (!next || gold < next.cost) return showTip("资源不足！");
    gold -= next.cost; currentEvoIdx++; 
    turretCount = EVO_LEVELS[currentEvoIdx].turrets; // 炮塔数量随科技提升
    updateUI();
    spawnExplosion(W/2, H-80, '#fbbf24', 80, 50); screenShake = 20;
}

function endGame(win = false) { 
    if(isGameOver) return; isGameOver = true; 
    if(win) document.getElementById('win-screen').classList.add('screen-active');
    else {
        document.getElementById('death-screen').classList.add('screen-active');
        document.getElementById('final-stats').innerText = `坚守了 ${wave} 波攻势`;
    }
}

function getTurretOffsets() {
    let offsets = []; const spacing = 30; 
    const startX = -((turretCount - 1) * spacing) / 2;
    for(let i=0; i<turretCount; i++) offsets.push(startX + i * spacing);
    return offsets;
}

// ------ 敌人生成系统 ------
let idCounter = 0;
function spawnEnemyAt(x, y, type) {
    let en; const hpMult = Math.pow(wave, 1.6);
    const id = idCounter++;
    if (type === 'siege_tower') en = { id, x, y, hp: 600+hpMult*120, maxHp: 600+hpMult*120, speed: 0.08, type, reward: 800+wave*10, baseSize: 2.8, dmg: 40, walk:0, state: 'moving', timer: 0, invincible: 0 };
    else if (type === 'chariot') en = { id, x, y, hp: 120+hpMult*30, maxHp: 120+hpMult*30, speed: 0.6+Math.random()*0.2, type, reward: 200+wave*2, baseSize: 1.5, dmg: 15, walk:0, invincible: 0 };
    else if (type === 'shield') en = { id, x, y, hp: 200+hpMult*50, maxHp: 200+hpMult*50, speed: 0.2, type, reward: 120+wave*2, baseSize: 1.4, dmg: 10, walk:0, invincible: 0 };
    else if (type === 'ice_mage' || type === 'green_mage') en = { id, x, y, hp: 180+hpMult*40, maxHp: 180+hpMult*40, speed: 0.05, type, reward: 300+wave*3, baseSize: 1.2, dmg: 10, walk:0, timer: 0, invincible: 0 };
    // 天火陨石：极高血量，极高伤害，玩家必须集火
    else if (type === 'meteor') en = { id, x, y, hp: 600, maxHp: 600, speed: 3.5, type, reward: 0, baseSize: 1.5, dmg: 20, walk:0, invincible: 0 }; 
    else en = { id, x, y, hp: 25+hpMult*10, maxHp: 25+hpMult*10, speed: 0.3+Math.random()*0.15, type, reward: 40+wave, baseSize: 1.0, dmg: 5, walk:0, invincible: 0 };
    entities.enemies.push(en);
}

function spawnEnemy() {
    const spread = W * 1.4; const x = W/2 + (Math.random() - 0.5) * spread; const y = -60; 
    const roll = Math.random();
    if (wave > 2 && roll < 0.015) spawnEnemyAt(x, y, 'ice_mage');
    else if (wave > 3 && roll < 0.03) spawnEnemyAt(x, y, 'green_mage');
    else if (roll < 0.08) spawnEnemyAt(x, y, 'siege_tower');
    else if (roll < 0.22) spawnEnemyAt(x, y, 'chariot');
    else if (roll < 0.45) spawnEnemyAt(x, y, 'shield');
    else spawnEnemyAt(x, y, 'infantry');
}

// ------ 终极Boss系统 ------
function spawnBoss(isUltimate) {
    if(isUltimate) {
        // 真·叹息之墙：60万血量
        boss = { isUltimate: true, hp: 600000, maxHp: 600000, x: W/2, y: -200, targetY: H * 0.15, state: 'entering', timer: 0, walk: 0 };
        bossNameEl.innerText = "灭世魔神 [终焉]"; bossNameEl.className = "text-red-500 font-black text-sm mb-1 tracking-widest text-shadow-sm";
        bossHpBarEl.className = "h-full bg-gradient-to-r from-red-900 to-red-500 transition-all duration-200";
        showTip("⚠️ 世界的终焉：灭世魔神降临！");
    } else {
        const bossHp = 15000 * Math.pow(wave/10, 1.4);
        boss = { isUltimate: false, hp: bossHp, maxHp: bossHp, x: W/2, y: -100, targetY: H * 0.2, state: 'entering', timer: 0, beamHeadY: 0, walk: 0 };
        bossNameEl.innerText = "深渊统领"; bossNameEl.className = "text-purple-300 font-bold text-sm mb-1 tracking-widest text-shadow-sm";
        bossHpBarEl.className = "h-full bg-gradient-to-r from-purple-800 to-fuchsia-500 transition-all duration-200";
        showTip("⚠️ 极度危险：深渊统领降临！");
    }
    bossUiEl.classList.add('active'); 
    entities.enemies.forEach(en => { en.state = 'retreat'; });
}

function updateBoss() {
    if (!boss) return;
    boss.walk += 0.05; bossHpBarEl.style.width = `${Math.max(0, (boss.hp / boss.maxHp) * 100)}%`;

    if(boss.isUltimate) {
        if (boss.state === 'entering') {
            boss.y += 1.2; if (boss.y >= boss.targetY) { boss.state = 'idle'; boss.timer = 120; }
        } else if (boss.state === 'idle') {
            boss.x = W/2 + Math.sin(frames * 0.01) * (W * 0.35); boss.timer--;
            if (boss.timer <= 0) {
                const roll = Math.random();
                if(roll < 0.35) {
                    boss.state = 'meteor'; boss.timer = 120; showTip("天火陨石！全力防空！");
                } else if (roll < 0.7) {
                    boss.state = 'summon'; boss.timer = 80; showTip("深渊大军袭来！");
                } else {
                    boss.state = 'warning'; boss.timer = 100; showTip("毁灭死光警告！");
                }
            }
        } else if (boss.state === 'meteor') {
            boss.timer--;
            // 召唤真实存在、可被击落的实体陨石
            if(boss.timer % 12 === 0) {
                spawnEnemyAt(Math.random() * W, boss.y, 'meteor');
            }
            if(boss.timer <= 0) { boss.state = 'idle'; boss.timer = 180; }
        } else if (boss.state === 'summon') {
            boss.timer--;
            if(boss.timer === 40) {
                for(let i=0; i<4; i++) spawnEnemyAt(boss.x + (i-1.5)*70, boss.y + 120, 'siege_tower');
                for(let i=0; i<3; i++) spawnEnemyAt(boss.x + (i-1)*100, boss.y + 120, 'ice_mage');
            }
            if(boss.timer <= 0) { boss.state = 'idle'; boss.timer = 150; }
        } else if (boss.state === 'warning') {
            boss.timer--; screenShake = 5;
            if (boss.timer <= 0) { boss.state = 'beaming'; boss.timer = 400; boss.beamHeadY = boss.y + 80; showTip("抵挡毁灭死光！！"); }
        } else if (boss.state === 'beaming') {
            screenShake = 12; boss.timer--; boss.beamHeadY += 2.0; // 终极死光推进更快
            entities.bullets.forEach(b => {
                if (b.hit) return;
                if (Math.abs(b.x - boss.x) < 60 && Math.abs(b.y - boss.beamHeadY) < 40) {
                    b.hit = true; boss.beamHeadY -= b.dmg * 0.05; spawnExplosion(b.x, boss.beamHeadY, '#fff', 5, 15);
                }
            });
            if (boss.beamHeadY >= H - 80) { 
                boss.beamHeadY = H - 80; baseHp -= 1.5; updateUI(); 
                if (baseHp <= 0) endGame(); spawnExplosion(boss.x, H-80, '#e74c3c', 10, 30); 
            }
            if (boss.timer <= 0) { boss.state = 'idle'; boss.timer = 200; }
        }
    } else {
        // 原版 Boss 逻辑
        if (boss.state === 'entering') { boss.y += 1; if (boss.y >= boss.targetY) { boss.state = 'idle'; boss.timer = 120; } } 
        else if (boss.state === 'idle') {
            boss.x = W/2 + Math.sin(frames * 0.01) * (W * 0.3); boss.timer--;
            if (boss.timer <= 0) {
                const roll = Math.random();
                if (roll < 0.4) { spawnEnemyAt(boss.x - 80, boss.y + 100, 'siege_tower'); spawnEnemyAt(boss.x + 80, boss.y + 100, 'siege_tower'); boss.timer = 200; } 
                else if (roll < 0.7) { entities.enemySpells.push({ x: boss.x, y: boss.y, tx: boss.x, ty: boss.y + 100, type: 'green', progress: 0 }); boss.timer = 150; } 
                else { boss.state = 'warning'; boss.timer = 120; }
            }
        } else if (boss.state === 'warning') {
            boss.timer--; if (frames % 10 === 0) screenShake = 5;
            if (boss.timer <= 0) { boss.state = 'beaming'; boss.timer = 300; boss.beamHeadY = boss.y + 80; showTip("抵挡毁灭死光！！"); }
        } else if (boss.state === 'beaming') {
            screenShake = 8; boss.timer--; boss.beamHeadY += 1.5; 
            entities.bullets.forEach(b => {
                if (b.hit) return;
                if (Math.abs(b.x - boss.x) < 50 && Math.abs(b.y - boss.beamHeadY) < 30) {
                    b.hit = true; boss.beamHeadY -= b.dmg * 0.1; spawnExplosion(b.x, boss.beamHeadY, '#fff', 3, 10);
                }
            });
            if (boss.beamHeadY >= H - 80) { boss.beamHeadY = H - 80; baseHp -= 0.8; updateUI(); if (baseHp <= 0) endGame(); spawnExplosion(boss.x, H-80, '#e74c3c', 5, 20); }
            if (boss.timer <= 0) { boss.state = 'idle'; boss.timer = 180; }
        }
    }

    if (boss.hp <= 0) {
        triggerGoldExplosion(boss.x, boss.y, boss.isUltimate ? 50000 : 5000 * (wave/10)); 
        createExplosionEffect(boss.x, boss.y);
        for(let i=0; i<15; i++) setTimeout(() => createExplosionEffect(boss.x + (Math.random()-0.5)*200, boss.y + (Math.random()-0.5)*200), i*150);
        
        const wasUltimate = boss.isUltimate;
        boss = null; bossUiEl.classList.remove('active'); 
        if(wasUltimate) endGame(true); else showTip("深渊统领已被击溃！");
    }
}

function spawnCrate() {
    const types = [ {type: 'gold', icon: '💰', color: '#f1c40f'}, {type: 'speed', icon: '⚡', color: '#3498db'}, {type: 'dmg', icon: '🔥', color: '#e67e22'} ];
    const t = types[Math.floor(Math.random() * types.length)];
    entities.crates.push({ x: W/2 + (Math.random() - 0.5) * (W * 0.6), y: 80 + Math.random() * (H * 0.4), hp: 300 + wave*80, maxHp: 300 + wave*80, life: 1200, type: t.type, icon: t.icon, color: t.color });
}

function findNearestTarget(tx, ty, angle, maxDist, spreadAngle) {
    let bestTarget = null, minDist = Infinity;
    const targets = [...entities.enemies, ...entities.crates]; if (boss) targets.push(boss);
    targets.forEach(t => {
        if(t.state === 'retreat') return;
        const dx = t.x - tx, dy = t.y - ty; const dist = Math.hypot(dx, dy);
        if(dist < maxDist) {
            const angleTo = Math.atan2(dy, dx); let diff = Math.abs(angleTo - angle);
            if(diff > Math.PI) diff = Math.PI*2 - diff;
            if(diff < spreadAngle && dist < minDist) { minDist = dist; bestTarget = t; }
        }
    });
    return bestTarget;
}

function dealDamage(target, amt) {
    if (target.invincible > 0) { if (frames % 3 === 0) spawnExplosion(target.x, target.y - 20, '#2ecc71', 2, 8); return false; }
    target.hp -= amt; return true;
}

function update() {
    if (isGameOver || isPaused) return;
    frames++;

    if (flashAlpha > 0) flashAlpha -= 0.015;

    if (!boss) {
        waveFrames++;
        if (waveFrames >= 600) { 
            waveFrames = 0; wave++; updateUI(); 
            if (wave === 10 || wave === 20) spawnBoss(false); 
            else if (wave === 30) spawnBoss(true);
        }
    } else { updateBoss(); }

    if (iceDebuffTimer > 0) { iceDebuffTimer--; if (iceDebuffTimer <= 0) { iceDebuffStacks = 0; updateUI(); } }
    const debuffMult = iceDebuffStacks === 0 ? 1 : (iceDebuffStacks === 1 ? 2 : 4);

    entities.lasers = []; const config = EVO_LEVELS[currentEvoIdx]; const offsets = getTurretOffsets();

    if (config.type === 'laser') {
        offsets.forEach(off => {
            const tx = W/2 + off; const ty = H-85; const dx = Math.cos(turretAngle), dy = Math.sin(turretAngle);
            let hitTarget = null, minHitDist = Infinity;
            
            if (boss && boss.state === 'beaming') {
                if (Math.abs(tx + dx * (boss.beamHeadY - ty) - boss.x) < 60) {
                    minHitDist = Math.hypot((tx + dx * (boss.beamHeadY - ty)) - tx, boss.beamHeadY - ty);
                    boss.beamHeadY -= (config.dmg * buffDmg) / debuffMult * 0.4;
                    spawnExplosion(boss.x, boss.beamHeadY, '#00f2ff', 2, 15); hitTarget = 'clash';
                }
            }

            if (!hitTarget) {
                const targets = [...entities.enemies, ...entities.crates]; if (boss) targets.push(boss);
                targets.forEach(target => {
                    if (target.state === 'retreat') return;
                    const scale = target === boss ? 2.5 : getPerspectiveScale(target.y);
                    const r = (target.baseSize || 1.5) * 18 * scale; 
                    const ex = target.x - tx, ey = target.y - ty; const proj = ex * dx + ey * dy; 
                    if (proj > 0) { 
                        const distSq = (ex - proj * dx)**2 + (ey - proj * dy)**2; 
                        if (distSq < r**2) { const tHit = proj - Math.sqrt(r**2 - distSq); if (tHit > 0 && tHit < minHitDist) { minHitDist = tHit; hitTarget = target; } }
                    }
                });
            }

            entities.lasers.push({ tx, ty, dx, dy, length: minHitDist === Infinity ? H * 1.5 : minHitDist });

            if (hitTarget && hitTarget !== 'clash') {
                dealDamage(hitTarget, (config.dmg * buffDmg) / debuffMult);
                if (frames % 4 === 0) spawnExplosion(tx + dx * minHitDist, ty + dy * minHitDist, '#00f2ff', 3, 10);
                const hitX = tx + dx * minHitDist; const hitY = ty + dy * minHitDist;
                entities.enemies.forEach(en => {
                    if (en !== hitTarget && en.state !== 'retreat' && Math.hypot(en.x - hitX, en.y - hitY) < 60) dealDamage(en, ((config.dmg * buffDmg) / debuffMult) * 0.4);
                });
            }
        });
    } else {
        fireCooldown--;
        if (fireCooldown <= 0) {
            fireCooldown = (config.rate * debuffMult) / buffAtkSpeed;
            if (config.type === 'cannon' || config.type === 'rocket') {
                offsets.forEach(off => {
                    const tx = W/2 + off; const ty = H-80;
                    let target = findNearestTarget(tx, ty, turretAngle, H*0.8, 0.5);
                    let targetX = tx + Math.cos(turretAngle) * H*0.6; let targetY = ty + Math.sin(turretAngle) * H*0.6;
                    if (target) { targetX = target.x; targetY = target.y; }
                    const dist = Math.hypot(targetX - tx, targetY - ty);
                    entities.bullets.push({ startX: tx, startY: ty, targetX, targetY, progress: 0, speed: config.type === 'rocket' ? 9 / dist : 6 / dist, type: config.type, dmg: config.dmg * buffDmg, hit: false });
                });
            } else {
                offsets.forEach(off => entities.bullets.push({ x: W/2 + off + Math.cos(turretAngle) * 40, y: H-80 + Math.sin(turretAngle) * 40, vx: Math.cos(turretAngle) * 20, vy: Math.sin(turretAngle) * 20, type: config.type, dmg: config.dmg * buffDmg, hit: false }));
            }
        }
    }

    if (!boss) {
        const spawnRate = 0.02 + Math.min(wave * 0.005, 0.1); 
        if (Math.random() < spawnRate) spawnEnemy();
        if (Math.random() < 0.002) spawnCrate();
    }

    entities.enemies.forEach((en, idx) => {
        if (en.invincible > 0) en.invincible--;
        if (en.state === 'retreat') { en.x += en.x > W/2 ? 3 : -3; en.walk += 0.3; if (en.x < -100 || en.x > W + 100) entities.enemies.splice(idx, 1); return; }

        if (en.type === 'ice_mage' && en.y > H * 0.25) { en.timer++; if (en.timer > 600) { en.timer = 0; entities.enemySpells.push({ x: en.x, y: en.y - 30, type: 'ice', startY: en.y - 30, progress: 0 }); } }
        if (en.type === 'green_mage' && en.y > H * 0.4) { en.timer++; if (en.timer > 600) { en.timer = 0; entities.enemySpells.push({ x: en.x, y: en.y - 30, tx: en.x + (Math.random()-0.5)*100, ty: en.y + 80 + Math.random()*50, type: 'green', progress: 0 }); } }
        if (en.type === 'siege_tower' && en.y > H * 0.3 && en.state === 'moving') { en.state = 'deploying'; en.speed = 0; }
        if (en.state === 'deploying') { en.timer++; if (en.timer > 150 - Math.min(wave*3, 100)) { en.timer = 0; spawnEnemyAt(en.x, en.y + 30, 'infantry'); spawnExplosion(en.x, en.y+30, '#fff', 8, 3); } }

        const dx = (W/2) - en.x, dy = (H-80) - en.y; const dist = Math.hypot(dx, dy);
        en.x += (dx / dist) * en.speed; en.y += (dy / dist) * en.speed; en.walk += 0.15;

        // 陨石坠落判定
        if (dist < 50 || (en.type === 'meteor' && en.y > H - 80)) { 
            baseHp -= en.dmg; screenShake = 30; en.hp = 0; 
            if(en.type === 'meteor') createExplosionEffect(en.x, H-80);
            updateUI(); if (baseHp <= 0) endGame(); 
        }
        if (en.hp <= 0) { if(en.type !== 'meteor') triggerGoldExplosion(en.x, en.y, en.reward); entities.enemies.splice(idx, 1); }
    });

    entities.crates.forEach((c, idx) => { c.life--; if (c.hp <= 0) { applyUpgrade(c.type); entities.crates.splice(idx, 1); } else if (c.life <= 0) { entities.crates.splice(idx, 1); } });

    entities.shockwaves.forEach((sw, idx) => {
        sw.r += sw.maxR / sw.maxLife; sw.life--; const thickness = 60; let knockResist = 1 + (wave / 15); 
        const targets = boss ? [boss, ...entities.enemies] : [...entities.enemies];
        targets.forEach(en => {
            if (en.state === 'retreat') return;
            let dist = Math.hypot(en.x - sw.x, en.y - sw.y);
            if (dist < sw.r && dist > sw.r - thickness && !sw.hitIds.has(en.id || 'boss')) {
                sw.hitIds.add(en.id || 'boss'); let falloff = Math.max(0.1, 1 - dist / sw.maxR); dealDamage(en, sw.dmg * falloff);
                if (en !== boss && en.state !== 'deploying' && en.type !== 'meteor') { en.y -= (150 * falloff) / knockResist; en.x += ((en.x > sw.x ? 1 : -1) * 100 * falloff) / knockResist; }
            }
        });
        if (sw.life <= 0) entities.shockwaves.splice(idx, 1);
    });

    entities.bullets.forEach((b, idx) => {
        if (b.type === 'cannon' || b.type === 'rocket') {
            b.progress += b.speed; b.x = b.startX + (b.targetX - b.startX) * b.progress; b.y = b.startY + (b.targetY - b.startY) * b.progress;
            const maxZ = b.type === 'rocket' ? Math.hypot(b.targetX-b.startX, b.targetY-b.startY) * 0.1 : Math.hypot(b.targetX-b.startX, b.targetY-b.startY) * 0.35; 
            b.z = Math.sin(b.progress * Math.PI) * maxZ;
            
            if (frames % 2 === 0) {
                let pColor = b.type === 'rocket' ? '#f39c12' : '#e74c3c';
                entities.particles.push({x: b.x, y: b.y - b.z, vx: (Math.random()-0.5)*2, vy: Math.random()*2, color: pColor, life: 0.5, size: b.type === 'rocket'?5:4});
            }

            if (b.progress >= 1) {
                let dmgRadius = b.type === 'rocket' ? 220 : 150; areaDamage(b.targetX, b.targetY, dmgRadius, b.dmg); 
                
                if(b.type === 'rocket') {
                    entities.explosions.push({ x: b.targetX, y: b.targetY, radius: 40, expansion: 5, life: 25, isMushroom: true }); screenShake = 20;
                } else {
                    createExplosionEffect(b.targetX, b.targetY); entities.explosions.push({ x: b.targetX, y: b.targetY, radius: 20, expansion: 10, life: 15, isRing: true }); screenShake = 12;
                }
                b.hit = true;
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            const targets = boss ? [boss, ...entities.enemies] : entities.enemies;
            targets.forEach(en => {
                if (en.state === 'retreat') return;
                const scale = en === boss ? 2.5 : getPerspectiveScale(en.y);
                if (Math.hypot(en.x - b.x, en.y - b.y) < 25 * (en.baseSize||1) * scale) { if (dealDamage(en, b.dmg)) b.hit = true; }
            });
            if (!boss) entities.crates.forEach(c => { if (Math.hypot(c.x - b.x, c.y - b.y) < 35 * getPerspectiveScale(c.y)) { c.hp -= b.dmg; b.hit = true; } });
        }
        if (b.hit || b.x < -100 || b.x > W+100 || b.y < -100) entities.bullets.splice(idx, 1);
    });

    entities.enemySpells.forEach((sp, idx) => {
        if (sp.type === 'ice') {
            sp.progress += 0.012; sp.y = sp.startY + (H - 80 - sp.startY) * sp.progress;
            if (frames % 3 === 0) spawnExplosion(sp.x, sp.y, '#00f2ff', 1, 5);
            if (sp.progress >= 1) { screenShake = 10; iceDebuffStacks = Math.min(2, iceDebuffStacks + 1); iceDebuffTimer = 180; updateUI(); spawnExplosion(sp.x, H-80, '#00f2ff', 30, 40); entities.enemySpells.splice(idx, 1); }
        } else if (sp.type === 'green') {
            sp.progress += 0.015; sp.x += (sp.tx - sp.x) * 0.05; sp.y += (sp.ty - sp.y) * 0.05;
            if (frames % 3 === 0) spawnExplosion(sp.x, sp.y, '#2ecc71', 1, 5);
            if (Math.hypot(sp.tx - sp.x, sp.ty - sp.y) < 10 || sp.progress >= 1) {
                entities.explosions.push({ x: sp.tx, y: sp.ty, radius: 15, expansion: 6, life: 25, color: 'rgba(46, 204, 113, ' });
                entities.enemies.forEach(en => { if (Math.hypot(en.x - sp.tx, en.y - sp.ty) < 130 * getPerspectiveScale(en.y)) en.invincible = 60; });
                entities.enemySpells.splice(idx, 1);
            }
        }
    });

    entities.coins.forEach((c, i) => {
        if (c.delay > 0) {
            c.x += c.vx; c.y += c.vy; c.z += c.vz; c.vz -= 0.8; if (c.z <= 0) { c.z = 0; c.vz *= -0.5; c.vx *= 0.8; c.vy *= 0.8; }
            c.delay--; if(frames % 2 === 0 && c.z > 5) entities.particles.push({x: c.x, y: c.y-c.z, vx:0, vy:0, color:'#f1c40f', life:0.5, size:2});
        } else {
            const targetX = 80, targetY = 50; c.x += (targetX - c.x) * 0.15; c.y += (targetY - c.y) * 0.15; 
            if(frames % 2 === 0) entities.particles.push({x: c.x, y: c.y, vx:0, vy:0, color:'#fff', life:0.3, size:3}); 
            if (Math.hypot(c.x - targetX, c.y - targetY) < 30) {
                gold += c.val; updateUI(); entities.coins.splice(i, 1);
                document.getElementById('gold-ui').classList.remove('gold-boom'); void document.getElementById('gold-ui').offsetWidth; document.getElementById('gold-ui').classList.add('gold-boom');
            }
        }
    });

    entities.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; if (p.life <= 0) entities.particles.splice(i, 1); });
    entities.thunderStrikes.forEach((t, i) => { t.life -= 0.25; if (t.life <= 0) entities.thunderStrikes.splice(i, 1); });
    
    entities.explosions.forEach((e, i) => { 
        e.life--; e.radius += e.expansion; 
        if(e.isMushroom) {
            if(frames % 2 === 0 && e.life > 0) {
                entities.particles.push({
                    x: e.x + (Math.random()-0.5)*e.radius*0.8, y: e.y - (25-e.life)*4,
                    vx: (Math.random()-0.5)*2, vy: -1 - Math.random()*3,
                    color: Math.random()>0.5 ? `rgba(50,50,50,${e.life/25})` : `rgba(200,80,10,${e.life/25})`,
                    life: 1.5, size: 8 + Math.random()*10
                });
            }
        }
        if (e.life <= 0) entities.explosions.splice(i, 1); 
    });
}

// ------ 渲染层 ------
function drawBackgroundDecor() {
    entities.bgDecors.forEach(d => {
        ctx.save(); ctx.translate(d.x, d.y); ctx.scale(d.size * d.flip, d.size); const pScale = getPerspectiveScale(d.y); ctx.scale(pScale, pScale);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 0, 15, 5, 0, 0, Math.PI*2); ctx.fill();
        if (d.type === 'rock') { ctx.fillStyle = '#4e342e'; ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-10, -20); ctx.lineTo(5, -25); ctx.lineTo(15, -5); ctx.fill(); ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.moveTo(5, -25); ctx.lineTo(15, -5); ctx.lineTo(0, 0); ctx.fill(); } 
        else if (d.type === 'sword') { ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(15, -30); ctx.stroke(); ctx.fillStyle = '#f1c40f'; ctx.fillRect(10, -20, 8, 4); } 
        else if (d.type === 'flag') { ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(0, -40); ctx.stroke(); ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(0, -35); ctx.quadraticCurveTo(15, -30 + Math.sin(frames*0.05)*5, 20, -20); ctx.lineTo(0, -20); ctx.fill(); }
        ctx.restore();
    });
}

function draw() {
    ctx.clearRect(0, 0, W, H); ctx.save();
    if (screenShake > 0) { ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake); screenShake *= 0.85; }
    drawBackgroundDecor(); 

    if(!isGameOver) { ctx.setLineDash([10, 15]); ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(W/2, H-80); ctx.lineTo(W/2 + Math.cos(turretAngle)*H, H-80 + Math.sin(turretAngle)*H); ctx.stroke(); ctx.setLineDash([]); }

    const renderList = [...entities.enemies, ...entities.crates]; if (boss) renderList.push(boss); renderList.sort((a, b) => a.y - b.y);

    renderList.forEach(obj => {
        if (obj === boss) { drawBoss(boss); return; }
        const scale = getPerspectiveScale(obj.y);
        if (obj.icon) { drawCrate(obj, scale); } else {
            if (obj.state === 'retreat') ctx.globalAlpha = Math.max(0, 1 - Math.abs(obj.x - W/2) / (W*0.6));
            drawDetailedEnemy(obj, scale); drawHpBar(obj.x - 15 * scale * obj.baseSize, obj.y - 45 * scale * obj.baseSize, 30 * scale * obj.baseSize, obj.hp / obj.maxHp);
            if (obj.invincible > 0) {
                ctx.save(); ctx.translate(obj.x, obj.y - 20 * scale * obj.baseSize); ctx.scale(scale * obj.baseSize, scale * obj.baseSize);
                const r1 = 30, r2 = 38; ctx.strokeStyle = `rgba(46, 204, 113, ${0.5 + Math.sin(frames*0.1)*0.3})`; ctx.lineWidth = 3;
                ctx.save(); ctx.rotate(frames * 0.05); ctx.beginPath(); ctx.arc(0, 0, r1, 0, Math.PI); ctx.stroke(); ctx.restore();
                ctx.save(); ctx.rotate(-frames * 0.04); ctx.strokeStyle = 'rgba(100, 255, 150, 0.6)'; ctx.beginPath(); ctx.arc(0, 0, r1+3, Math.PI, Math.PI*2); ctx.stroke(); ctx.restore();
                ctx.fillStyle = `rgba(46, 204, 113, 0.15)`; ctx.beginPath(); ctx.ellipse(0, 0, r1-2, r2-2, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
            ctx.globalAlpha = 1;
        }
    });

    const offsets = getTurretOffsets();
    offsets.forEach(off => {
        ctx.fillStyle = '#1a100b'; ctx.beginPath(); ctx.ellipse(W/2 + off, H-80, 22, 12, 0, 0, Math.PI*2); ctx.fill(); 
        const grad = ctx.createRadialGradient(W/2+off, H-85, 2, W/2+off, H-85, 14); grad.addColorStop(0, '#95a5a6'); grad.addColorStop(1, '#34495e');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(W/2 + off, H-85, 14, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = iceDebuffStacks > 0 ? '#00f2ff' : '#2c3e50'; ctx.lineWidth = 3; ctx.stroke();
        ctx.save(); ctx.translate(W/2 + off, H-85); ctx.rotate(turretAngle); ctx.fillStyle = iceDebuffStacks > 0 ? '#1f4864' : '#2c3e50'; ctx.fillRect(0, -5, 25, 10); ctx.restore();
    });

    entities.shockwaves.forEach(sw => {
        ctx.save(); ctx.globalCompositeOperation = 'screen';
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.strokeStyle = `rgba(255, 100, 0, ${sw.life/sw.maxLife})`; ctx.lineWidth = 40 * (sw.life/sw.maxLife); ctx.stroke();
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r * 0.8, 0, Math.PI*2); ctx.strokeStyle = `rgba(255, 255, 255, ${sw.life/sw.maxLife})`; ctx.lineWidth = 10 * (sw.life/sw.maxLife); ctx.stroke();
        ctx.restore();
    });

    if (boss && !boss.isUltimate && boss.state === 'warning') { ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)'; ctx.lineWidth = 15; ctx.beginPath(); ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x, H); ctx.stroke(); } 
    else if (boss && !boss.isUltimate && boss.state === 'beaming') {
        ctx.globalCompositeOperation = 'screen'; ctx.strokeStyle = 'rgba(150, 0, 255, 0.8)'; ctx.lineWidth = 35 + Math.random()*10; ctx.beginPath(); ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x, boss.beamHeadY); ctx.stroke();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 15; ctx.beginPath(); ctx.moveTo(boss.x, boss.y); ctx.lineTo(boss.x, boss.beamHeadY); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(boss.x, boss.beamHeadY, 25 + Math.random()*10, 0, Math.PI*2); ctx.fill(); ctx.globalCompositeOperation = 'source-over';
    }

    // 终极Boss的毁灭死光
    if (boss && boss.isUltimate && boss.state === 'beaming') {
        ctx.globalCompositeOperation = 'screen'; 
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.9)'; ctx.lineWidth = 45 + Math.random()*15; 
        ctx.beginPath(); ctx.moveTo(boss.x, boss.y+20); ctx.lineTo(boss.x, boss.beamHeadY); ctx.stroke();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 20; 
        ctx.beginPath(); ctx.moveTo(boss.x, boss.y+20); ctx.lineTo(boss.x, boss.beamHeadY); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(boss.x, boss.beamHeadY, 35 + Math.random()*15, 0, Math.PI*2); ctx.fill(); 
        ctx.globalCompositeOperation = 'source-over';
    }

    ctx.globalCompositeOperation = 'screen';
    entities.lasers.forEach(l => {
        ctx.strokeStyle = iceDebuffStacks > 0 ? 'rgba(0, 150, 255, 0.3)' : 'rgba(0, 242, 255, 0.5)'; ctx.lineWidth = 12; ctx.beginPath(); ctx.moveTo(l.tx, l.ty); ctx.lineTo(l.tx + l.dx * l.length, l.ty + l.dy * l.length); ctx.stroke();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = iceDebuffStacks > 0 ? 2 : 4; ctx.beginPath(); ctx.moveTo(l.tx, l.ty); ctx.lineTo(l.tx + l.dx * l.length, l.ty + l.dy * l.length); ctx.stroke();
    });

    entities.enemySpells.forEach(sp => {
        if (sp.type === 'ice') { ctx.fillStyle = '#00f2ff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff'; ctx.beginPath(); ctx.arc(sp.x, sp.y, 8, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; } 
        else if (sp.type === 'green') { ctx.fillStyle = '#2ecc71'; ctx.shadowBlur = 20; ctx.shadowColor = '#2ecc71'; ctx.beginPath(); ctx.arc(sp.x, sp.y, 8, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
    });

    ctx.globalCompositeOperation = 'source-over';
    entities.bullets.forEach(b => {
        ctx.save();
        if (b.type === 'cannon' || b.type === 'rocket') {
            const drawScale = 1 + b.z / 100; ctx.translate(b.x, b.y - b.z); ctx.scale(drawScale, drawScale);
            if (b.type === 'rocket') {
                ctx.rotate(Math.atan2(b.targetY - b.startY, b.targetX - b.startX));
                ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-10, -4, 20, 8);
                ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(10, -4); ctx.lineTo(18, 0); ctx.lineTo(10, 4); ctx.fill();
                ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.moveTo(-10, -4); ctx.lineTo(-14, -6); ctx.lineTo(-10, 0); ctx.lineTo(-14, 6); ctx.lineTo(-10, 4); ctx.fill();
            } else {
                ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'rgba(255,100,100,0.5)'; ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
            }
        } else {
            ctx.translate(b.x, b.y); ctx.rotate(Math.atan2(b.vy, b.vx));
            if (b.type === 'bow') { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke(); ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(5, -4); ctx.lineTo(5, 4); ctx.fill(); } 
            else if (b.type === 'mg') { ctx.fillStyle = '#f1c40f'; ctx.fillRect(-20, -2, 30, 4); ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(-5, -1, 10, 2); }
        }
        ctx.restore();
    });

    entities.explosions.forEach(e => {
        if (e.isRing) { ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.strokeStyle = `rgba(255, 200, 100, ${e.life/15})`; ctx.lineWidth = 5; ctx.stroke(); } 
        else if (e.isMushroom) {
            ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 100, 0, ${e.life/25})`; ctx.fill();
        } else { 
            ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.strokeStyle = e.color ? `${e.color}${e.life/20})` : `rgba(231, 76, 60, ${e.life / 20})`; ctx.lineWidth = 15 * (e.life/20); ctx.stroke(); if (!e.color) { ctx.fillStyle = `rgba(241, 196, 15, ${e.life / 40})`; ctx.fill(); } 
        }
    });

    entities.thunderStrikes.forEach(t => {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = t.width; ctx.shadowBlur = 30; ctx.shadowColor = '#00f2ff';
        ctx.beginPath(); ctx.moveTo(t.x, 0); let currY = 0, currX = t.x;
        while(currY < t.y) { currX += (Math.random()-0.5)*30; currY += 40; ctx.lineTo(currX, currY); }
        ctx.stroke(); ctx.shadowBlur = 0; ctx.fillStyle = '#00f2ff'; ctx.beginPath(); ctx.ellipse(currX, t.y, t.width*2, t.width/2, 0, 0, Math.PI*2); ctx.fill(); 
    });

    entities.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1;

    entities.coins.forEach(c => { if(caches.coin) ctx.drawImage(caches.coin, c.x - 20, (c.y - c.z) - 20); });

    if (flashAlpha > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
    ctx.restore();
}

function drawBoss(b) {
    ctx.save(); ctx.translate(b.x, b.y); ctx.scale(2.5, 2.5);
    
    if(b.isUltimate) {
        const pulse = Math.sin(frames * 0.1) * 5; ctx.translate(0, pulse);
        
        // 暗红护盾光环
        ctx.globalCompositeOperation = 'screen';
        ctx.beginPath(); ctx.arc(0, 0, 80 + pulse, 0, Math.PI*2);
        const auraGrad = ctx.createRadialGradient(0,0,30,0,0,80+pulse);
        auraGrad.addColorStop(0, 'rgba(255, 0, 0, 0.8)'); auraGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = auraGrad; ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // 巨型魔神肩甲
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath(); ctx.moveTo(-60, -30); ctx.lineTo(-20, -10); ctx.lineTo(-30, 20); ctx.fill();
        ctx.beginPath(); ctx.moveTo(60, -30); ctx.lineTo(20, -10); ctx.lineTo(30, 20); ctx.fill();

        // 黑曜石身躯
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(40, -10); ctx.lineTo(20, 60); ctx.lineTo(-20, 60); ctx.lineTo(-40, -10); ctx.fill();
        ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2; ctx.stroke();
        
        // 恶魔之角
        ctx.fillStyle = '#8B0000';
        ctx.beginPath(); ctx.moveTo(20, -40); ctx.quadraticCurveTo(70, -80, 50, -10); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-20, -40); ctx.quadraticCurveTo(-70, -80, -50, -10); ctx.fill();

        // 猩红凝视
        ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
        ctx.beginPath(); ctx.ellipse(-15, -15, 8, 3, Math.PI/6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(15, -15, 8, 3, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

        // 能量反应堆核心
        ctx.fillStyle = b.state === 'beaming' ? '#fff' : '#f39c12';
        ctx.beginPath(); ctx.arc(0, 20, 12 + Math.random()*3, 0, Math.PI*2); ctx.fill();
        
        if (b.state === 'warning' || b.state === 'beaming') {
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)'; ctx.lineWidth = 15;
            ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(0, H); ctx.stroke();
        }
    } else {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.beginPath(); ctx.ellipse(0, 50, 30, 10, 0, 0, Math.PI*2); ctx.fill();
        const floatY = Math.sin(frames * 0.05) * 5; ctx.translate(0, floatY);
        ctx.fillStyle = '#4a235a'; ctx.beginPath(); ctx.moveTo(-20, -20); ctx.quadraticCurveTo(-40, 20, -10 + Math.sin(frames*0.1)*10, 40); ctx.lineTo(10 + Math.sin(frames*0.1+1)*10, 40); ctx.quadraticCurveTo(40, 20, 20, -20); ctx.fill();
        const bodyGrad = ctx.createLinearGradient(0, -30, 0, 10); bodyGrad.addColorStop(0, '#17202a'); bodyGrad.addColorStop(1, '#2c3e50'); ctx.fillStyle = bodyGrad;
        ctx.beginPath(); ctx.moveTo(-25, -20); ctx.lineTo(25, -20); ctx.lineTo(15, 15); ctx.lineTo(-15, 15); ctx.fill();
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, -35, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(-4, -35, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4, -35, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawCrate(obj, scale) {
    ctx.save(); ctx.translate(obj.x, obj.y); ctx.scale(scale, scale); ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.ellipse(0, 20, 25, 10, 0, 0, Math.PI*2); ctx.fill(); 
    ctx.fillStyle = '#5d4037'; ctx.fillRect(-20, -15, 40, 30); ctx.fillStyle = '#4e342e'; ctx.beginPath(); ctx.arc(0, -15, 20, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#f1c40f'; ctx.fillRect(-16, -15, 4, 30); ctx.fillRect(12, -15, 4, 30); 
    ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.fillText(obj.icon, 0, -35 + Math.sin(frames*0.1)*5);
    drawHpBar(-25, 25, 50, obj.hp / obj.maxHp); ctx.restore();
}

function drawDetailedEnemy(en, pScale) {
    const scale = pScale * en.baseSize; ctx.save(); ctx.translate(en.x, en.y); ctx.scale(scale, scale);
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI*2); ctx.fill(); const legMove = Math.sin(en.walk) * 12;

    if (en.type === 'infantry') {
        ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-6, 15 + legMove); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(6, 15 - legMove); ctx.stroke();
        const bodyGrad = ctx.createLinearGradient(-8, -12, 8, 6); bodyGrad.addColorStop(0, '#e74c3c'); bodyGrad.addColorStop(1, '#c0392b'); ctx.fillStyle = bodyGrad; ctx.fillRect(-8, -12, 16, 18);
        ctx.beginPath(); ctx.arc(0, -20, 8, 0, Math.PI*2); ctx.fillStyle='#95a5a6'; ctx.fill(); ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-4, -20, 8, 4); 
    } else if (en.type === 'shield') {
        ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-8, 15 + legMove); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(8, 15 - legMove); ctx.stroke();
        ctx.fillStyle = '#34495e'; ctx.fillRect(-12, -14, 24, 22); ctx.fillStyle = '#d35400'; ctx.fillRect(-18, -20, 36, 40); ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 3; ctx.strokeRect(-18, -20, 36, 40);
        ctx.beginPath(); ctx.moveTo(-18, 20); ctx.lineTo(0, 30); ctx.lineTo(18, 20); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.arc(0, -26, 9, 0, Math.PI*2); ctx.fillStyle = '#2c3e50'; ctx.fill(); 
    } else if (en.type === 'chariot') {
        if(caches.chariotBody) ctx.drawImage(caches.chariotBody, -30, -40);
        ctx.fillStyle = '#f39c12'; ctx.save(); ctx.translate(-20, 5); ctx.rotate(en.walk*4); ctx.fillRect(-8,-8,16,16); ctx.fillStyle='#fff'; ctx.fillRect(-2,-12,4,24); ctx.fillRect(-12,-2,24,4); ctx.restore();
        ctx.fillStyle = '#f39c12'; ctx.save(); ctx.translate(20, 5); ctx.rotate(en.walk*4); ctx.fillRect(-8,-8,16,16); ctx.fillStyle='#fff'; ctx.fillRect(-2,-12,4,24); ctx.fillRect(-12,-2,24,4); ctx.restore();
    } else if (en.type === 'siege_tower') {
        ctx.fillStyle = '#4e342e'; ctx.fillRect(-24, -65, 48, 70); ctx.strokeStyle = '#2d1b15'; ctx.lineWidth = 4; ctx.strokeRect(-24, -65, 48, 70);
        ctx.beginPath(); ctx.moveTo(-24,-45); ctx.lineTo(24,-45); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-24,-25); ctx.lineTo(24,-25); ctx.stroke();
        ctx.fillStyle = '#d35400'; ctx.beginPath(); ctx.moveTo(-30,-65); ctx.lineTo(30,-65); ctx.lineTo(0,-90); ctx.fill(); 
        if (en.state === 'deploying') { ctx.fillStyle = '#000'; ctx.fillRect(-12, -25, 24, 30); }
    } else if (en.type === 'ice_mage' || en.type === 'green_mage') {
        const isIce = en.type === 'ice_mage'; ctx.strokeStyle = '#34495e'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-4, 15 + legMove); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(4, 15 - legMove); ctx.stroke();
        ctx.fillStyle = isIce ? '#2980b9' : '#27ae60'; ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(-12, 5); ctx.lineTo(12, 5); ctx.fill(); ctx.beginPath(); ctx.arc(0, -22, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, -22, 6, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = isIce ? '#00f2ff' : '#2ecc71'; ctx.beginPath(); ctx.arc(-2, -22, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(2, -22, 2, 0, Math.PI*2); ctx.fill(); 
    } else if (en.type === 'meteor') {
        // 天火陨石渲染
        ctx.beginPath(); ctx.arc(0, 0, 15 + Math.random()*5, 0, Math.PI*2);
        ctx.fillStyle = '#e74c3c'; ctx.fill(); 
        ctx.shadowBlur = 20; ctx.shadowColor = '#f39c12'; ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.lineTo(0, -40); ctx.fill();
    }
    ctx.restore();
}

function drawHpBar(x, y, w, r) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(x, y, w, 6); ctx.fillStyle = r > 0.4 ? '#2ecc71' : '#e74c3c'; ctx.fillRect(x, y, w * Math.max(0, r), 6);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, 6);
}

function applyUpgrade(type) {
    screenShake = 25;
    if(type === 'gold') { triggerGoldExplosion(W/2, H/2, 1200); showTip("军饷运达！+1200金"); }
    else if(type === 'speed') { buffAtkSpeed += 0.1; showTip("微风加持！攻速提升"); }
    else if(type === 'dmg') { buffDmg += 0.05; showTip("刀刃打磨！伤害提升"); }
}

function triggerGoldExplosion(x, y, val) {
    const count = Math.min(30, Math.floor(val / 40) + 4); 
    for(let i=0; i<count; i++) entities.coins.push({ x, y, z: 20 + Math.random() * 25, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, vz: Math.random()*10 + 6, val: val/count, delay: 120 + Math.random()*60 });
}

function areaDamage(x, y, r, d, ignoreInvincible = false) {
    const targets = boss ? [boss, ...entities.enemies, ...entities.crates] : [...entities.enemies, ...entities.crates];
    targets.forEach(t => { 
        if(Math.hypot(t.x - x, t.y - y) < r * getPerspectiveScale(t.y)) {
            if (ignoreInvincible && t.hp !== undefined) t.hp -= d; else if (t.invincible !== undefined) dealDamage(t, d); else t.hp -= d; 
        }
    });
}

function spawnExplosion(x, y, color, count=15, spread=15) { for(let i=0; i<count; i++) entities.particles.push({ x, y, vx: (Math.random()-0.5)*spread, vy: (Math.random()-0.5)*spread, color, life: 1, size: Math.random()*6+2 }); }
function createExplosionEffect(x, y) { entities.explosions.push({ x, y, radius: 10, expansion: 8, life: 20 }); spawnExplosion(x, y, '#e67e22', 25, 20); spawnExplosion(x, y, '#fff', 10, 30); }

function updateUI() {
    goldValEl.innerText = Math.floor(gold); hpBarEl.style.width = `${Math.max(0, baseHp)}%`; waveTextEl.innerText = `第 ${wave} 波`;
    const nextEvo = EVO_LEVELS[currentEvoIdx + 1];
    if(nextEvo) {
        evoNameEl.innerText = `升级 ${nextEvo.name}`; evoCostEl.innerText = `${nextEvo.cost}金`;
        document.getElementById('btn-evolve').classList.toggle('btn-disabled', gold < nextEvo.cost);
    } else {
        evoNameEl.innerText = "武器全满"; evoCostEl.innerText = "已达巅峰";
        document.getElementById('btn-evolve').classList.add('btn-disabled');
    }
    document.getElementById('btn-thunder').classList.toggle('btn-disabled', gold < 800);
    document.getElementById('btn-shock').classList.toggle('btn-disabled', gold < 1500);

    if (iceDebuffStacks > 0) { iceWarningEl.style.opacity = '1'; iceWarningEl.innerText = `❄️ 极寒冻结 x${iceDebuffStacks}`; } else iceWarningEl.style.opacity = '0';
}

function showTip(t) {
    const tip = document.createElement('div');
    tip.className = "fixed top-1/3 left-1/2 -translate-x-1/2 bg-gradient-to-r from-amber-600 to-amber-500 text-white font-black px-6 py-3 rounded-full shadow-[0_10px_30px_rgba(245,158,11,0.5)] z-[100] whitespace-nowrap text-xl tracking-widest border-2 border-amber-300 pointer-events-none";
    tip.innerText = t; document.body.appendChild(tip);
    setTimeout(() => { tip.style.transition = "all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)"; tip.style.opacity = "0"; tip.style.transform = "translate(-50%, -80px) scale(0.8)"; setTimeout(() => tip.remove(), 600); }, 1200);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.onload = () => { updateUI(); loop(); };
</script>
</body>
</html>
