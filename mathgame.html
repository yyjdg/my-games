<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>趣味逻辑数独 - 算术数独游戏</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes scale-in-center {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .scale-in-center {
            animation: scale-in-center 0.3s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;
        }
        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .no-drag {
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==================== 核心逻辑与生成器 ====================
        
        function getRandomIndices(N, count) {
            let arr = Array.from({length: N}, (_, i) => i);
            for(let i = 0; i < count; i++) {
                let j = i + Math.floor(Math.random() * (N - i));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.slice(0, count);
        }
        
        function evaluateCondition(cond, assignment) {
            let vals = cond.indices.map(i => assignment[i]);
            if (vals.includes(0)) return true;
            
            let type = cond.type;
            let params = cond.params;
            
            if (type === 'given') {
                let sorted = vals.slice().sort((a,b)=>a-b);
                for(let i = 0; i < vals.length; i++) if(sorted[i] !== params.values[i]) return false;
                return true;
            }
            if (type === 'exclude') {
                for(let v of vals) if(params.values.includes(v)) return false;
                return true;
            }
            if (type === 'sum') return vals.reduce((a,b)=>a+b, 0) === params.sum;
            if (type === 'diff') return Math.abs(vals[0] - vals[1]) === params.diff;
            if (type === 'a+b=c') {
                let v = vals.slice().sort((a,b)=>a-b);
                return v[0] + v[1] === v[2];
            }
            if (type === 'a+b+c=d') {
                let v = vals.slice().sort((a,b)=>a-b);
                return v[0] + v[1] + v[2] === v[3];
            }
            if (type === 'a+b=c+d') {
                let v = vals.slice().sort((a,b)=>a-b);
                return v[0] + v[3] === v[1] + v[2];
            }
            return true;
        }
        
        function checkPartialOrder(assignment, conditions, assignedSet) {
            for (let cond of conditions) {
                let assignedInCond = cond.indices.filter(idx => assignedSet.has(idx));
                let allAssigned = assignedInCond.length === cond.indices.length;
                
                if (allAssigned) {
                    if (!evaluateCondition(cond, assignment)) return false;
                } else if (assignedInCond.length > 0) {
                    let assignedVals = assignedInCond.map(idx => assignment[idx]);
                    if (cond.type === 'sum') {
                        let pSum = assignedVals.reduce((a,b)=>a+b, 0);
                        let rem = cond.indices.length - assignedVals.length;
                        let minRemSum = (rem * (rem + 1)) / 2; 
                        if (pSum + minRemSum > cond.params.sum) return false;
                    }
                    if (cond.type === 'exclude') {
                        for(let v of assignedVals) if(cond.params.values.includes(v)) return false;
                    }
                }
            }
            return true;
        }
        
        function solveOrder(N, conditions, maxSols = 2, maxSteps = 3000) {
            let freq = new Array(N).fill(0);
            conditions.forEach(c => c.indices.forEach(idx => freq[idx]++));
            
            let order = Array.from({length: N}, (_, i) => i);
            order.sort((a, b) => freq[b] - freq[a]);
            
            let solutions = 0;
            let assignment = new Array(N).fill(0);
            let used = new Array(N + 1).fill(false);
            let steps = 0;
            let assignedSet = new Set();
        
            function backtrack(stepIndex) {
                if (solutions >= maxSols || steps > maxSteps) return;
                steps++;
                if (stepIndex === N) {
                    solutions++;
                    return;
                }
        
                let cellIndex = order[stepIndex];
                assignedSet.add(cellIndex);
                
                for (let v = 1; v <= N; v++) {
                    if (!used[v]) {
                        assignment[cellIndex] = v;
                        used[v] = true;
                        if (checkPartialOrder(assignment, conditions, assignedSet)) {
                            backtrack(stepIndex + 1);
                        }
                        used[v] = false;
                        assignment[cellIndex] = 0;
                    }
                }
                assignedSet.delete(cellIndex);
            }
            backtrack(0);
            return { solutions, steps };
        }
        
        function createCondition(target, level, typesList) {
            const N = target.length;
            let type, indices, params = {}, text;
            let maxTries = 100;
        
            while(maxTries-- > 0) {
                type = typesList[Math.floor(Math.random() * typesList.length)];
                let vars = 2;
                if (type === 'given3') vars = 3;
                else if (type === 'a+b+c=d') vars = 4;
                else if (type === 'a+b=c+d') vars = 4;
                else if (type === 'a+b=c') vars = 3;
                else if (type === 'given') vars = level === 'advanced' ? 4 : 3;
                else vars = 2;
                
                if (['given2', 'given3', 'given', 'exclude', 'sum', 'diff'].includes(type)) {
                    indices = getRandomIndices(N, vars);
                    let vals = indices.map(i => target[i]);
                    
                    if (type.startsWith('given')) {
                        params.values = vals.slice().sort((a,b)=>a-b);
                        text = `包含: ${params.values.join(', ')}`;
                        break;
                    }
                    if (type === 'exclude') {
                        let pool = [];
                        for(let v = 1; v <= N; v++) if(!vals.includes(v)) pool.push(v);
                        if (pool.length === 0) continue;
                        let val = pool[Math.floor(Math.random() * pool.length)];
                        params.values = [val];
                        text = `不含: ${val}`;
                        break;
                    }
                    if (type === 'sum') {
                        params.sum = vals.reduce((a,b)=>a+b, 0);
                        text = `和为 ${params.sum}`;
                        break;
                    }
                    if (type === 'diff') {
                        params.diff = Math.abs(vals[0] - vals[1]);
                        text = `差为 ${params.diff}`;
                        break;
                    }
                } else {
                    let valid = [];
                    for(let i = 0; i < N; i++)
                    for(let j = i+1; j < N; j++)
                    for(let k = j+1; k < N; k++) {
                        if (vars === 3) {
                            let v = [target[i], target[j], target[k]].sort((a,b)=>a-b);
                            if (type === 'a+b=c' && v[0] + v[1] === v[2]) valid.push([i,j,k]);
                        } else if (vars === 4) {
                            for(let l = k+1; l < N; l++) {
                                let v = [target[i], target[j], target[k], target[l]].sort((a,b)=>a-b);
                                if (type === 'a+b+c=d' && v[0] + v[1] + v[2] === v[3]) valid.push([i,j,k,l]);
                                if (type === 'a+b=c+d' && v[0] + v[3] === v[1] + v[2]) valid.push([i,j,k,l]);
                            }
                        }
                    }
                    if (valid.length > 0) {
                        indices = valid[Math.floor(Math.random() * valid.length)];
                        if (type === 'a+b=c') text = '⭐ + ⭐ = ⭐';
                        if (type === 'a+b+c=d') text = '⭐ + ⭐ + ⭐ = ⭐';
                        if (type === 'a+b=c+d') text = '⭐ + ⭐ = ⭐ + ⭐';
                        break;
                    }
                }
            }
            
            if (maxTries <= 0) {
                let vars = level === 'beginner' ? 2 : (level === 'intermediate' ? 3 : 4);
                indices = getRandomIndices(N, vars);
                params.sum = indices.map(i => target[i]).reduce((a,b)=>a+b, 0);
                return { type: 'sum', indices, params, text: `和为 ${params.sum}` };
            }
            
            return { type: type.replace(/\d/g, ''), indices, params, text };
        }
        
        async function generateGameAsync(level) {
            let N = level === 'advanced' ? 16 : 9;
            let reqConds = level === 'beginner' ? 6 : (level === 'intermediate' ? 9 : 12);
            
            // 调整各种算式的比重，确保各类都有
            const types = [];
            if (level === 'beginner') {
                // 入门：侧重简单和、差、固定值
                for(let i = 0; i < 2; i++) types.push('given2');
                for(let i = 0; i < 2; i++) types.push('given3');
                for(let i = 0; i < 3; i++) types.push('sum');
                for(let i = 0; i < 2; i++) types.push('diff');
                for(let i = 0; i < 1; i++) types.push('exclude');
            } else if (level === 'intermediate') {
                // 中级：增加等式，减少固定值
                for(let i = 0; i < 1; i++) types.push('given');
                for(let i = 0; i < 3; i++) types.push('sum');
                for(let i = 0; i < 2; i++) types.push('diff');
                for(let i = 0; i < 2; i++) types.push('exclude');
                for(let i = 0; i < 3; i++) types.push('a+b=c');
            } else if (level === 'advanced') {
                // 高级：复杂等式为主
                for(let i = 0; i < 1; i++) types.push('given');
                for(let i = 0; i < 2; i++) types.push('sum');
                for(let i = 0; i < 1; i++) types.push('diff');
                for(let i = 0; i < 2; i++) types.push('exclude');
                for(let i = 0; i < 3; i++) types.push('a+b=c');
                for(let i = 0; i < 3; i++) types.push('a+b+c=d');
                for(let i = 0; i < 2; i++) types.push('a+b=c+d');
            }
        
            while(true) {
                for (let batch = 0; batch < 20; batch++) {
                    let target = Array.from({length: N}, (_, i) => i + 1);
                    for (let i = target.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [target[i], target[j]] = [target[j], target[i]];
                    }
                    
                    let conditions = [];
                    for (let i = 0; i < reqConds; i++) {
                        conditions.push(createCondition(target, level, types));
                    }
                    
                    let covered = new Set();
                    conditions.forEach(c => c.indices.forEach(idx => covered.add(idx)));
                    if (covered.size < N - 1) continue; 
                    
                    let res = solveOrder(N, conditions, 2, 3500);
                    if (res.solutions === 1) {
                        return { target, conditions, N, level };
                    }
                }
                await new Promise(r => setTimeout(r, 10));
            }
        }
        
        // ==================== 图标组件 ====================
        const Loader2 = () => <svg className="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeOpacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeLinecap="round"/></svg>;
        const RotateCcw = () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9M3 3v6h6"/></svg>;
        const Check = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>;
        const Info = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const Sparkles = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3L14 8L19 10L14 12L12 17L10 12L5 10L10 8L12 3Z"/><path d="M19 4L20 7L23 8L20 9L19 12L18 9L15 8L18 7L19 4Z"/></svg>;
        const Star = () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15 9 22 9 16 14 19 22 12 17 5 22 8 14 2 9 9 9 12 2"/></svg>;
        const RefreshCw = () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
        
        // ==================== 主组件 ====================
        function App() {
            const [level, setLevel] = useState('beginner');
            const [gameState, setGameState] = useState(null);
            const [board, setBoard] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [resultMsg, setResultMsg] = useState(null);
            const currentGenId = useRef(0);
        
            const startNewGame = (lvl) => {
                setLoading(true);
                setLevel(lvl);
                setSelected(null);
                setResultMsg(null);
                const genId = ++currentGenId.current;
                
                setTimeout(async () => {
                    const puzzle = await generateGameAsync(lvl);
                    if (currentGenId.current === genId) {
                        setGameState(puzzle);
                        setBoard(new Array(puzzle.N).fill(0));
                        setLoading(false);
                    }
                }, 50);
            };
        
            useEffect(() => {
                startNewGame('beginner');
            }, []);
        
            const handleCellClick = (idx) => {
                if (selected) {
                    let newBoard = [...board];
                    if (selected.type === 'bank') {
                        newBoard[idx] = selected.value;
                    } else if (selected.type === 'board') {
                        let temp = newBoard[idx];
                        newBoard[idx] = newBoard[selected.index];
                        newBoard[selected.index] = temp;
                    }
                    setBoard(newBoard);
                    setSelected(null);
                } else {
                    if (board[idx] !== 0) {
                        setSelected({ type: 'board', value: board[idx], index: idx });
                    }
                }
            };
        
            const handleBankClick = (num) => {
                if (selected && selected.type === 'board') {
                    let newBoard = [...board];
                    newBoard[selected.index] = 0;
                    setBoard(newBoard);
                    setSelected(null);
                } else {
                    setSelected({ type: 'bank', value: num });
                }
            };
        
            const handleCellDrop = (e, idx) => {
                e.preventDefault();
                try {
                    const data = JSON.parse(e.dataTransfer.getData('application/json'));
                    let newBoard = [...board];
                    if (data.type === 'bank') {
                        newBoard[idx] = data.value;
                    } else if (data.type === 'board') {
                        let temp = newBoard[idx];
                        newBoard[idx] = newBoard[data.index];
                        newBoard[data.index] = temp;
                    }
                    setBoard(newBoard);
                    setSelected(null);
                } catch(err) {}
            };
        
            const handleBankDrop = (e) => {
                e.preventDefault();
                try {
                    const data = JSON.parse(e.dataTransfer.getData('application/json'));
                    if (data.type === 'board') {
                        let newBoard = [...board];
                        newBoard[data.index] = 0;
                        setBoard(newBoard);
                    }
                    setSelected(null);
                } catch(err) {}
            };
        
            const verify = () => {
                if (board.includes(0)) {
                    setResultMsg('请先将所有数字填入棋盘！');
                    return;
                }
                let isCorrect = true;
                for(let i = 0; i < gameState.N; i++) {
                    if (board[i] !== gameState.target[i]) {
                        isCorrect = false;
                        break;
                    }
                }
                setResultMsg(isCorrect ? '🎉 恭喜，解答完全正确！逻辑大师！' : '❌ 答案不满足所有条件，请继续尝试！');
            };
        
            const availableNumbers = gameState 
                ? Array.from({length: gameState.N}, (_, i) => i + 1).filter(n => !board.includes(n))
                : [];
        
            const gridSize = gameState?.N === 16 ? 4 : 3;
        
            return (
                <div className="min-h-screen bg-slate-100 font-sans text-slate-800 pb-4 relative overflow-x-hidden no-drag" onDragOver={e => e.preventDefault()}>
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-3 md:p-4 shadow-md relative overflow-hidden">
                        <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '24px 24px'}}></div>
                        <div className="max-w-5xl mx-auto text-center relative z-10 flex flex-col items-center justify-center">
                            <h1 className="text-xl md:text-2xl font-extrabold tracking-tight flex items-center justify-center gap-2">
                                <Sparkles />
                                趣味逻辑数独
                                <Sparkles />
                            </h1>
                            <p className="opacity-90 mt-1 text-xs md:text-sm font-medium">不比数字大小，比拼数学逻辑。找出唯一解！</p>
                        </div>
                    </div>
        
                    {/* Level Selector */}
                    <div className="flex justify-center items-center flex-wrap gap-2 md:gap-3 p-2 bg-white border-b border-slate-200 shadow-sm sticky top-0 z-20">
                        {['beginner', 'intermediate', 'advanced'].map(lvl => (
                            <button
                                key={lvl}
                                onClick={() => startNewGame(lvl)}
                                className={`px-4 py-1.5 md:px-5 md:py-2 rounded-full font-bold text-xs md:text-sm transition-all duration-300 ${
                                    level === lvl 
                                        ? 'bg-blue-100 text-blue-700 ring-2 ring-blue-500 ring-offset-1 shadow-sm' 
                                        : 'bg-slate-50 text-slate-600 hover:bg-slate-200 border border-slate-200'
                                }`}
                            >
                                {lvl === 'beginner' ? '🌱 入门(3x3)' : lvl === 'intermediate' ? '🌟 中级(3x3)' : '🔥 高级(4x4)'}
                            </button>
                        ))}
                        <div className="w-[1px] h-6 bg-slate-300 mx-1"></div>
                        <button
                            onClick={() => startNewGame(level)}
                            className="px-3 py-1.5 md:px-4 md:py-2 rounded-full font-bold text-xs md:text-sm bg-green-100 text-green-700 hover:bg-green-200 transition-all flex items-center gap-1 border border-green-200"
                        >
                            <RefreshCw /> 刷新本局
                        </button>
                    </div>
        
                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto mt-3 px-2 md:px-4 relative">
                        {loading && (
                            <div className="absolute inset-0 z-30 flex flex-col items-center justify-center bg-slate-100/90 rounded-2xl backdrop-blur-sm min-h-[400px]">
                                <div className="w-10 h-10 text-blue-600 animate-spin mb-3"><Loader2 /></div>
                                <p className="text-slate-700 font-bold text-lg animate-pulse">生成唯一解...</p>
                            </div>
                        )}
        
                        <div className="flex flex-col lg:flex-row gap-3 md:gap-4 items-start">
                            {/* Left: Board & Controls */}
                            <div className="flex-shrink-0 w-full lg:w-[340px] xl:w-[380px] bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center relative z-10">
                                
                                <div className="flex justify-between w-full mb-3 items-center px-1">
                                    <span className="text-slate-500 font-semibold text-xs md:text-sm">点击或拖拽方块</span>
                                    <button 
                                        onClick={() => { setBoard(new Array(gameState?.N || 9).fill(0)); setSelected(null); }}
                                        className="text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1 text-xs md:text-sm font-semibold bg-slate-50 px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-slate-200"
                                    >
                                        <RotateCcw /> 清空
                                    </button>
                                </div>
        
                                {/* Board */}
                                <div 
                                    className={`grid gap-1.5 sm:gap-2 mb-5 bg-slate-200 p-2 sm:p-2.5 rounded-xl ${gridSize === 4 ? 'grid-cols-4' : 'grid-cols-3'}`}
                                >
                                    {board.map((val, idx) => (
                                        <div
                                            key={idx}
                                            onDragOver={e => e.preventDefault()}
                                            onDrop={e => handleCellDrop(e, idx)}
                                            onClick={() => handleCellClick(idx)}
                                            className={`w-14 h-14 sm:w-16 sm:h-16 md:w-16 md:h-16 flex items-center justify-center text-xl sm:text-2xl font-black rounded-lg cursor-pointer transition-all duration-200 select-none
                                                ${val !== 0 
                                                    ? 'bg-blue-600 text-white shadow-[0_3px_0_rgb(30,58,138)] hover:translate-y-[-2px] hover:shadow-[0_5px_0_rgb(30,58,138)] active:translate-y-[3px] active:shadow-none' 
                                                    : 'bg-slate-50 text-slate-300 border-[2px] border-dashed border-slate-300 hover:bg-white'}
                                                ${selected?.type === 'board' && selected?.index === idx ? 'ring-4 ring-yellow-400 scale-[1.05]' : ''}
                                                ${selected?.type === 'bank' && val === 0 ? 'hover:ring-4 hover:ring-blue-300' : ''}
                                            `}
                                            draggable={val !== 0}
                                            onDragStart={(e) => {
                                                e.dataTransfer.setData('application/json', JSON.stringify({type: 'board', value: val, index: idx}));
                                            }}
                                        >
                                            {val !== 0 ? val : ''}
                                        </div>
                                    ))}
                                </div>
        
                                {/* Bank */}
                                <div className="w-full bg-slate-50 rounded-xl p-3 border border-slate-200 min-h-[90px]"
                                     onDragOver={e => e.preventDefault()}
                                     onDrop={handleBankDrop}>
                                    <p className="text-center text-xs font-semibold text-slate-400 mb-2">待填入区</p>
                                    <div className="flex flex-wrap gap-1.5 sm:gap-2 justify-center">
                                        {availableNumbers.map(num => (
                                            <div
                                                key={num}
                                                draggable
                                                onDragStart={(e) => {
                                                    e.dataTransfer.setData('application/json', JSON.stringify({type: 'bank', value: num}));
                                                }}
                                                onClick={() => handleBankClick(num)}
                                                className={`w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center bg-white border-2 border-slate-200 rounded-lg shadow-sm text-base sm:text-lg font-bold cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-all select-none
                                                    ${selected?.type === 'bank' && selected?.value === num ? 'ring-4 ring-yellow-400 scale-[1.15] border-transparent z-10' : ''}
                                                `}
                                            >
                                                {num}
                                            </div>
                                        ))}
                                        {availableNumbers.length === 0 && (
                                            <div className="w-full text-center text-slate-400 text-sm font-medium py-2">已全部放置</div>
                                        )}
                                    </div>
                                </div>
        
                                {/* Verify Button */}
                                <button
                                    onClick={verify}
                                    className="mt-4 w-full py-3 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 text-white rounded-lg font-bold text-lg shadow-[0_3px_0_rgb(21,128,61)] active:translate-y-[3px] active:shadow-none transition-all flex items-center justify-center gap-2"
                                >
                                    <Check /> 验证答案
                                </button>
                            </div>
        
                            {/* Right: Conditions */}
                            <div className="flex-grow w-full bg-white rounded-2xl p-4 shadow-sm border border-slate-200 relative z-10">
                                <h3 className="text-base md:text-lg font-bold mb-3 flex items-center gap-2 border-b border-slate-100 pb-2 text-slate-700">
                                    <Info /> 必须同时满足以下条件：
                                </h3>
                                <div className="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-3">
                                    {gameState?.conditions.map((cond, i) => (
                                        <div key={i} className="flex flex-col items-center bg-slate-50 p-2 sm:p-2.5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                            {/* Mini Grid */}
                                            <div className={`grid gap-[1px] bg-slate-300 border-[1px] border-slate-300 rounded overflow-hidden mb-2 sm:mb-2.5 ${gridSize === 4 ? 'grid-cols-4' : 'grid-cols-3'}`}>
                                                {Array.from({length: gameState.N}).map((_, cIdx) => {
                                                    let isCond = cond.indices.includes(cIdx);
                                                    return (
                                                        <div key={cIdx} className="w-5 h-5 sm:w-6 sm:h-6 bg-white flex items-center justify-center">
                                                            {isCond && cond.type === 'exclude' && <span className="text-red-500 font-black text-sm">X</span>}
                                                            {isCond && cond.type !== 'exclude' && <Star />}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            {/* Text Description */}
                                            <div className="text-center font-bold text-slate-700 text-xs sm:text-sm bg-white px-2 py-0.5 rounded-md border border-slate-100 w-full overflow-hidden text-ellipsis whitespace-normal break-words">
                                                {cond.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
        
                    {/* Modal */}
                    {resultMsg && (
                        <div className="fixed inset-0 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm z-50 px-4">
                            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center scale-in-center">
                                <div className="text-5xl md:text-6xl mb-3 md:mb-4">{resultMsg.includes('🎉') ? '🥳' : '🤔'}</div>
                                <h3 className="text-xl md:text-2xl font-black mb-2 text-slate-800">
                                    {resultMsg.includes('🎉') ? '太棒了！' : '哎呀...'}
                                </h3>
                                <p className="text-base md:text-lg text-slate-600 mb-6 font-medium">{resultMsg}</p>
                                <button 
                                    onClick={() => setResultMsg(null)}
                                    className="w-full py-2.5 md:py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold text-base md:text-lg transition-colors shadow-md"
                                >
                                    我知道了
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        // 渲染到 DOM
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
